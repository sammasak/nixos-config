# Generated/managed fan curve for msi-ms7758 (Z77A-G43 / Fintek f71869a).
#
# This targets the CPU package temperature (coretemp) and controls pwm1/fan1
# exposed by the f71882fg driver.
#
# Notes:
# - Values are a starting point and may need tuning (MINSTART/MINSTOP).
# - Paths are absolute to avoid hwmon index drift.
INTERVAL=2

FCTEMPS=/sys/class/hwmon/hwmon0/device/pwm1=/sys/class/hwmon/hwmon2/temp1_input
FCFANS=/sys/class/hwmon/hwmon0/device/pwm1=/sys/class/hwmon/hwmon0/device/fan1_input

# Stay silent at idle, ramp hard under sustained load.
MINTEMP=/sys/class/hwmon/hwmon0/device/pwm1=45
MAXTEMP=/sys/class/hwmon/hwmon0/device/pwm1=80

# Minimum PWM needed to start the fan from a stop (tune if needed).
MINSTART=/sys/class/hwmon/hwmon0/device/pwm1=150

# PWM used when below MINTEMP (0 = stop). If your fan stalls and doesn't restart,
# increase MINSTOP and/or MINSTART.
MINSTOP=/sys/class/hwmon/hwmon0/device/pwm1=0

MINPWM=/sys/class/hwmon/hwmon0/device/pwm1=0
MAXPWM=/sys/class/hwmon/hwmon0/device/pwm1=255

