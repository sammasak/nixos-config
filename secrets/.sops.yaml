# SOPS configuration for secrets encryption
#
# Setup instructions:
# 1. Generate an age key: age-keygen -o ~/.config/sops/age/keys.txt
# 2. Add the public key below
# 3. For each host, also add its SSH host key (converted to age):
#    ssh-keyscan hostname | ssh-to-age
#
creation_rules:
  # Homelab secrets (k3s cluster token, etc.)
  - path_regex: homelab/.*\.yaml$
    key_groups:
      - age:
          # Add your personal age public key here:
          - age19qew4x4ly4lk8ud7ttpcwtxlr7wfvtu5xlv632jqxc4x6vpvmdjsm6alqh
          # Add host SSH keys converted to age (for unattended decryption):
          - age13lj7pyzzspnk8ck3rg5kgh63ekm7k9j5cyzl8awzr37hnr34r94qugqc4y
          - age1uu9y3sfr4htk4rrsw66df5gn2xt3t3mykm52ljxlctj37yuza5mqpxlyuk
          # Flux public
          - age1z6smanefg6sl5pe88h8c8enetgsrrrakjqak86v3jhkpk639vyfsswg3e2

  # Host-specific secrets
  - path_regex: hosts/.*\.yaml$
    key_groups:
      - age: []
